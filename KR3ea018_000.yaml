body:
  text: 正文經曰夫五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也可不通乎又曰治不法天之紀地之理則災害至矣又曰不知年之所加氣之盛衰虛實之所起不可以為工矣由是觀之不知運氣而為醫欲其無失者鮮矣茲將內經運氣要語編成歌訣並列圖於前使學者一覽即明其大綱旨要之所在然後遍求全經精義庶乎有得云太虛理氣天地陰陽歌無極太虛氣中理太極太虛理中氣乘氣動靜生陰陽陰陽之分為天地未有天地氣生形已有天地形寓氣從形究氣曰陰陽即氣觀理曰太極注太者極其至大之謂也虛者空虛無物之謂也蓋極大極虛無聲無臭之中具有極大極至之理氣焉理氣未分而混沌者太虛也太虛曰無極者是主太虛流行之氣中主宰之理而言也太虛曰太極者是主太虛主宰之理中流行之氣而言也故周子曰無極而太極者亦是以極無而推極有也蓋極無中無是而非理極有中無是而非氣不以極無之理而推極有之氣何以知有是氣也不以極有之氣而推極無之理何以知有是理也是則可知理氣以其分殊而言之二也以其渾合而言之一也有是理則有是氣有是氣則有是理名雖有二其實則一本無有無一二先後之可言也乘氣動靜生陰陽者謂太極乘氣機之動而生陽乘氣機之靜而生陰即周子曰太極動而生陽靜而生陰之謂也然不曰無極動而生陽靜而生陰而曰太極動而生陽靜而生陰者蓋以無極專主乎理言理無動靜故也太極兼主乎氣言氣有動靜故也陰陽之分為天地者謂陰陽流行相生不已積陽之清者為天積陰之濁者為地故周子曰分明分陽兩儀立焉也未有天地氣生形者謂未有天地惟太虛中之一氣化生天地之形也已有天地形寓氣者謂已有天地而太虛之氣即已寓於天地之形也是以天得之以資萬物之始地得之以資萬物之生也從形究氣曰陰陽者陰陽即理中流行之氣也即氣觀理曰太極者太極即氣中主宰之理也故周子曰陰陽一太極者是指氣之極者而言也太極本無極者是指理之極者而言也按吳澄曰太極無動靜動靜者氣機也是以太極專主乎理言也朱子曰太極之有動靜是天命之流行也是以太極兼主乎氣言也又曰太虛者本然之妙也動靜者所乘之機也本然之妙即太極指其本然主宰是動是靜之妙之理也所乘之機即動靜指其天命流行乘動乘靜之機之氣也當依朱子為是五行質氣生剋制化歌天地陰陽生五行各一其質各一氣質具於地氣行天五行順布四時序木火土金水相生木土水火金剋制亢害承製制生化生生化化萬物立注天地既立而陰陽即在天地之中陽動而變陰靜而合生五行也天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之是五行各一其質也東方生木木之氣風南方生火火之氣熱中央生土土之氣濕西方生金金之氣燥北方生水水之氣寒是五行各一其氣也在地曰木在天曰風在地曰火在天曰熱在地曰土在天曰濕在地曰金在天曰燥在地曰水在天曰寒是五行質具於地氣行於天也木位東方風氣布春火位南方熱氣布夏土位中央四維濕氣布長夏金位西方燥氣布秋水位北方寒氣布冬是五氣順布四時之序也即周子曰陽變陰合而生水火木金土五氣順布四時行焉木生火火生土土生金金生水水復生木是五行相生主生養萬物者也木剋土土剋水水剋火火剋金金剋木木復剋土是五行相剋主殺害萬物者也相剋則死相制則生木亢害土土亢害水水亢害火火亢害金金亢害木此克其所勝者也然我之所勝之子即我之所不勝者也我畏彼子出救母害不敢妄行承受乃制制則生化則各恆其德而生化萬物無不具也假如木亢太過土受害矣是我勝其我之所勝者也土之子金承而制焉則我畏我之所不勝自然承受乃制制則生化矣火亢太過金受制矣金之子水承而制焉土亢太過水受制矣水之子木承而制焉金亢太過木受制矣木之子火承而制焉水亢太過火受制矣火之子土承而制焉五行皆若此也此所以相生而不害相制而不克也而生生化化萬物立命之道即在於是矣此五行生剋制化之理不可不知者也運氣合臟腑十二經絡歌醫明陰陽五行理始曉天時民病情五運五行五氣化六氣天地陰陽生火分君相氣熱暑為合人之臟腑經天干起運地支氣天五地六節制成注學醫業者必要明天地陰陽五行之理始曉天時之和不和民之生病之情由也人皆知五運化自五行五質五氣也而不知六氣化自天地陰陽六質六氣也六質者即經曰木火土金水火地之陰陽也生長化收藏下應之也六氣者即經曰風暑濕燥寒火天之陰陽也三陰三陽上奉之也是以在地之火分為君火相火在天之氣分為熱氣暑氣為合人之五臟六腑包絡十二經也天於陰陽合而為五故主五運甲化陽土合人之胃己化陰土合人之脾乙化陰金合人之肺庚化陽金合人大腸丙化陽水合人膀胱辛化陰水合人之腎丁化陰木合人之肝壬化陽木合人之膽戊化陽火合人小腸癸化陰火合人之心相火屬陽者合人三焦相火屬陰者合人包絡此天干合人之五臟六腑十二經也地支陰陽合而為六故主六氣子午主少陰君火合人之心與小腸也丑未主太陰濕土合人之脾與胃也寅申主少陽相火合人之三焦包絡也卯酉主陽明燥金合人之肺與大腸也辰戌主太陽寒水合人之膀胱與腎也巳亥主厥陰風木合人之肝與膽也此地支之合人之五臟六腑十二經也天數五而五陰五陽故為十干地數六而六陰六陽故為十二支天干之五必得地支之六以為節地支之六必得天干之五以為制而後六甲成歲氣備故一歲中運以七十二日五位分主之六氣以六十日六步分主之也按十二經天干歌內云甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎藏三焦亦向壬中寄包絡同歸入癸方此以方位言天干所屬配合臟腑歲歲之常也今以五運言天干所化配合臟腑年年之變所以不同也十二經地支歌內云肺寅大卯胃辰宮脾巳心午小未中申胱酉腎心包戌亥焦子膽醜肝通此以流行言地支所屬配合臟腑日日之常也今以六氣言地支所化配合臟腑年年之變所以不同也讀者審之主運歌五運五行御五位五氣相生順令行此是常今年不易然有相得或逆從運有太過不及理人有虛實寒熱情天時不和萬物病民病合人臟腑生注主運者主運行四時之常令也五行者木火土金水也五位者東南中西北也五氣者風暑濕燥寒也木御東方風氣順布春令是初之運也火御南方暑氣順布夏令是二之運也土御中央四維濕氣順布長夏之令是三之運也金御西方燥氣順布秋令是四之運也水御北方寒氣順布冬令是五之運也此是天以五為制分五方主之五運五氣相生四時常令年年相仍而不易也然其中之氣化有相得或不相得或從天氣或逆天氣或從天氣而逆地氣或逆天氣而從地氣故運有太過不及四時不和之理人有臟腑經絡虛實寒熱不同之情始召外邪令化而生病也天時不和萬物皆病而為民病者亦必因其人臟腑不和而生也主氣歌主氣六位同主運顯明之右君位知退行一步相火治復行一步土治之復行一步金氣治復行一步水治之復行一步木氣治復行一步君治之注主氣者厥陰風木主春初之氣也少陰君火主夏二之氣也少陽相火主盛夏三之氣也太陰濕土主長夏四之氣也陽明燥金主秋五之氣也太陽寒水主冬六之氣也此是地以六為節分六位主之六氣相生同主運五氣相生四時之常令也顯明者正南之位當君位也而君火不在位治之反退位於次以相火代君火司化則當知即經云少陰不司氣化之義也正南客氣司天之位也司天之右天之右間位也在主氣為二之氣位是少陰君火之位主行夏令之氣也故曰顯明之右君火之位也君火之右退行一步乃客氣司天之位也在主氣為三之氣位是少陽相火之位主行盛夏之令之氣也不曰復行而曰退行者以臣對君之面承命司化不敢背行故曰退行一步即復行一步也復行一步土氣治之乃客氣天之左間位也在主氣為四之氣位是太陰濕土之位主行長夏令之氣也復行一步金氣治之乃客氣地之右間位也在主氣為五之氣位是陽明燥金之位主行秋令之氣也復行一步水氣治之乃客氣在泉之位也在主氣為六之氣位是太陽寒水之位主行冬令之氣也復行一步木氣治之乃客氣地之左間位也在主氣為初之氣位是厥陰風木之位主行春令之氣也復行一步君火治之即前君火之位治之也客運歌五天蒼丹黅玄素天氣天干合化臨甲己化土丙辛水丁壬化木乙庚金戊癸化火五客運起以中運相生輪陰少乙丁己辛癸陽太甲丙戊庚壬注五天者蒼天天之色青者也丹天天之色赤者也黅天天之色黃者也玄天天之色黑者也素天天之色白者也天氣者蒼天之氣木也丹天之氣火也黅天之氣土也玄天之氣水也素天之氣金也天干者甲乙丙丁戊己庚辛壬癸也古聖仰觀五天五氣蒼天木氣下臨丁壬之方故識丁壬合化而生木運也丹天火氣下臨戊癸之方故識戊癸合化而生火運也黅天土氣下臨甲己之方故識甲己合化而生土運也玄天水氣下臨丙辛之方故識丙辛合化而生水運也素天金氣下臨乙庚之方故識乙庚合化而生金運也此天氣天干合化加臨主運五位之客運也起以所化統主本年中運為初運五行相生以次輪取如甲己之年土運統之起初運土生金為二運金生水為三運水生木為四運木生火為五運餘四運皆仿土運起之乙丁己辛癸屬陰乾為五陰年主五少不及之運甲丙戊庚壬屬陽干為五陽年主五太太過之運也客氣司天在泉間氣歌子午少陰君火天陽明燥金應在泉丑未太陰太陽治寅申少陽厥陰聯卯酉卻與子午倒辰戌巳亥亦皆然每歲天泉四間氣上下分統各半年注天干起運地支起氣此言地之陰陽正化對化加臨主氣六位之客氣也如子午之歲少陰君火治之起司天也陽明燥金在下起在泉也氣由下而升上故以在下之陽明起之陽明二陽二陽生三陽三陽太陽故太陽寒水為客初氣即地之左間也三陽陽極生一陰一陰厥陰故厥陰為客二氣即天之右間也一陰生二陰二陰少陰故少陰為客三氣即司天之氣也二陰生三陰三陰太陰故太陰為客四氣即天之左間也三陰陰極生一陽一陽少陽故少陽為客五氣即地之右間也一陽生二陽二陽陽明故陽明為客六氣即在泉之氣也丑未寅申之歲皆仿此法起之卯酉卻與子午倒換辰戌卻與丑未倒換巳亥卻與寅申倒換謂卯酉之歲陽明燥金司天少陰君火在泉辰戌之歲太陽寒水司天太陰濕土在泉巳亥之歲厥陰風木司天少陽相火在泉彼此倒換也每歲司天在泉左右四間氣者即六氣分統上下本年司天統主上半年在泉統主下半年之統氣也運氣分主節令歌大立雨驚春清穀立滿芒夏小大暑立處白秋寒霜立小大冬小從頭數初大二春十三日三運芒種十日甫四運處暑後七日五運立冬四日主注天以六為節謂以二十四氣六分分之為六氣之六步也地以五為制謂以二十四氣五分分之為五運之五位也二十四氣即大寒立春雨水驚蟄主初之氣也春分清明穀雨立夏主二之氣也小滿芒種夏至小暑主三之氣也大暑立秋處暑白露主四之氣也秋分寒露霜降立冬主五之氣也小雪大雪冬至小寒主終之氣也此主氣客氣分主六步之時也大寒起至春分後十二日主初運也春分十三日起至芒種後九日主二運也芒種十日起至處暑後六日主三運也處暑七日起至立冬後三日主四運也立冬四日起至小寒末日主五運也此主運客運分主五位之時也五音主客太少相生歌主運角徵宮商羽五音太少中運取如逢太徵太商年必是少角少宮羽若逢太角宮羽年必是少商與少徵以客取主太少生以主定客重角羽注主運之音必始角而終羽者乃五音分主四時順布之常序也然陽年為太陰年為少者是五音四時太過不及之變化也如逢戊年太徵庚年太商之年則主運初運必是少角二運則是太徵三運必是少宮四運則是太商終運必是少羽也若逢壬年太角甲年太宮丙年太羽之年則主運初運則是太角二運必是少徵三運則是太宮四運必是少商終運則是太羽也故曰太少皆以中運取此是以客之中運取主之五運太少相生之義也又以主之太少定客之五運太少相重之法以發明相加相臨太過不及之理也五運齊化兼化六氣正化對化歌運過勝己畏齊化不及乘衰勝己兼太過被克不及助皆為正化是平年氣寅午未酉戌亥正司化令有餘看子醜卯辰巳申歲對司化令不足言注五運之中運統主一年之運也中運太過則旺勝己者則畏其盛反齊其化矣如太宮土運反齊木化太角木運反齊金化太商金運反齊火化太微火運反齊水化太羽水運反齊土化也即經所謂畏其旺反同其化薄其所不勝也中運不及則弱勝己者則乘其衰來兼其化矣如少宮土運木來兼化少角木運金來兼化少商金運火來兼化少徵火運水來兼化少羽水運土來兼化即經所謂乘其弱來同其化所不勝薄之也中運戊辰陽年火運太過遇寒水司天則為太過被制中運乙卯陰年金運不及遇燥金司天則為同氣中運辛卯陰年水運不及則為相生俱為不及得助凡遇此類皆為正化平和之年也氣者六氣之客氣統一歲之司化之氣也如厥陰司巳亥以厥陰屬木木生於亥故正化於亥對化於巳也少陰司子午以少陰為君火當正南離位故正化於午對化於子也太陰司丑未以太陰屬土居中旺於西南未宮故正化於未對化於醜也少陽司寅申以少陽屬相火位卑於君火火生於寅故正化於寅對化於申也陽明司卯酉以陽明屬金酉為西方金位故正化於酉對化於卯也太陽司辰戌以太陽為水辰戌屬土然水行土中而戌居西北屬水漸王之鄉是以洪範五行以戌屬水故正化於戌對化於辰也是以寅午未酉戌亥為正化正化者令之實主有餘也子醜卯辰巳申為對化對化者令之虛主不足也六十年運氣上下相臨歌客運中運主一歲客氣天泉主半年氣生中運曰順化運被氣克天刑言運生天氣乃小逆運克司天不和愆氣運相同天符歲另有天符歲會參注客運之初運即統主一歲之中運也經曰甲己之歲土運統之云云者是也客氣司天之三氣六氣即統主上半年在泉統主下半年之氣也經曰歲半以前天氣主之歲半以後地氣主之者是也六十年中運氣上下臨遇則有相得不相得者也氣生中運者謂司天生中運也如癸巳癸亥木生火也甲子甲午甲寅甲申火生土也乙丑乙未土生金也辛卯辛酉金生水也壬辰壬戌水生木也六十年中有此十二年天氣生運以上生下故名順化為相得之歲也運被氣克者謂司天克中運也如己巳己亥木剋土也辛丑辛未土剋水也戊辰戊戌水剋火也庚子庚午庚寅庚申火剋金也丁卯丁酉金剋木也六十年中有此十二年天氣克運以上克下故名天刑為不相得之歲也運生天氣者謂中運生司天也如癸丑癸未火生土也壬子壬午壬寅壬申木生火也辛巳辛亥水生木也庚辰庚戌金生水也己卯己酉土生金也六十年中有此十二年運生天氣以下生上雖曰相生然子居母上故為小逆而主微病也運克司天者謂中運克司天也如乙巳乙亥金剋木也丙子丙午丙寅丙申水剋火也丁丑丁未木剋土也癸卯癸酉火剋金也甲辰甲成土剋水也六十年中有此十二年運克天氣以下克上故名不和亦為不相得而主病甚也氣運相同者如運氣皆木丁巳丁亥運氣皆火戊子戊午戊寅戊申運氣皆土己丑己未運氣皆金乙卯乙酉運氣皆水丙辰丙戌六十年中有此十二年運氣相同皆天符也雖曰同氣不無偏勝亢害焉其太乙天符歲會等年另詳在後起主客定位指掌歌掌中指上定司天中指根紋定在泉順進食指初二位四指四五位推傳司天即是三氣位在泉六氣位當然主以木火土金水客以陰陽一二三注左手仰掌以中指上頭定司天之位中指根紋定在泉之位順進食指三節紋定初之氣位頭節紋定二之氣位中指上頭定三之氣位即司天之位也第四指頭節紋定四之氣位二節紋定五之氣位中指根紋定六之氣位即在泉之位也主氣以木火土金水者五氣順布之五位也故初之氣厥陰風木二之氣少陰君火三之氣少陽相火四之氣太陰濕土五之氣陽明燥金六之氣太陽寒水是木生火火生土土生金金生水水復生木順布相生之序一定不易者也客氣以一二三名之者三陰三陽六氣加臨也故厥陰為一陰少陰為二陰太陰為三陰少陽為一陽陽明為二陽太陽為三陽是一生二二生三三複生一陰極生陽陽極生陰六步升降之次每歲排取也以此定位主氣客氣瞭然在握矣天符太乙天符歲會同天符同歲會歌天符中運同天氣歲會本運臨本支四正四維皆歲會太乙天符符會俱同天符與同歲會泉同中運即同司陰歲名曰同歲會陽年同天符所知注天符者謂中運與司天之氣同一氣也如木運木司天丁巳丁亥也火運火司天戊子戊午戊寅戊申也土運土司天己丑己未也金運金司天乙卯乙酉也水運水司天丙辰丙戌也共十二年歲會者謂本運臨本支之位也如木運臨卯丁卯年也火運臨午戊午年也金運臨酉乙酉年也水運臨子丙子年也此是四正土運臨四季甲辰甲戌己丑己未也此是四維共八年太乙天符者謂天符之年又是歲會是天氣運氣歲支三者俱會也如己丑己未中運之土與司天土同氣又土運臨丑未也乙酉中運之金與司天金同氣又金運臨酉也戊午中運之火與司天火同氣又火運臨午也共四年同天符同歲會者謂在泉之氣與中運之氣同一氣也以陽年名曰同天符如木運木在泉壬寅壬申也土運土在泉甲辰甲戌也金運金在泉庚子庚午也以陰年名曰同歲會如水運水在泉辛丑辛未也火運火在泉癸卯癸酉癸巳癸亥也共十二年此氣運符會之不同人不可不知也右天符十二年太乙天符四年歲會八年同天符六年同歲會六年然太乙天符四年己同在天符十二年中矣歲會八年亦有四年同在天符中矣合而言之六十年中只得二十八年也執法行令貴人歌天符執法犯司天歲會行令犯在泉太乙貴人犯天地速危徐持暴死占二火相臨雖相得然有君臣順逆嫌順則病遠其害小逆則病近害速纏注邪之中人在天符之年名曰中執法是犯司天天氣天陽也陽性速故其病速而危也邪之中人在歲會之年名曰中行令是犯在泉地氣地陰也陰性徐故其病徐而持也邪之中人在太乙天符之年名曰中貴人是犯司天在泉之氣天地之氣俱犯故其病暴而死也二火君火相火也雖同氣相得然有君臣順逆之嫌不可不知也君火君也相火臣也二火相臨謂司天加臨中運六步客主加臨君火在上相火在下為君臨臣則順順則病遠其害小也相火在上君火在下為臣犯君則逆逆則病近其害速也南北政年脈不應歌天地之氣行南北甲己一運南政年其餘四運俱為北少陰隨在不應占北政反診候不應姑存經義待賢參從違非失分微甚尺反陰陽交命難注天地之氣謂三陰三陽司天在泉左間右間之客氣也客氣行南政之歲謂之南政行北政之歲謂之北政南政之歲惟甲己一運其餘乙庚丙辛丁壬戊癸四運俱為北政之年也少陰隨在不應占者謂少陰君火客氣隨在司天在泉左間右間加臨之位主占其脈不應於診也應於診者即經曰少陰之至其脈鉤不應者謂脈不鈞也南政之年少陰司天則主佔兩寸不應在泉則主佔兩尺不應厥陰司天其天左間則少陰主占右寸不應太陰司天其天右間則少陰主占左寸不應厥陰在泉其泉左間則少陰主占左尺不應太陰在泉其泉右間則少陰主占右尺不應此皆在客氣少陰之位也北政之年則反診候其不應皆在客氣陽明之位如少陰司天則主佔兩尺不應在泉則主佔兩寸不應厥陰司天其天左間則少陰主占左尺不應太陰司天其天右間則少陰主占右尺不應厥陰在泉其泉左間則少陰主占右寸不應太陰在泉其泉右間則少陰主占左寸不應然南政十二年北政四十八年其南政候以正診北政候以反診應與不應之理熟玩經文總令人難解姑存經義以待後之賢者參詳可也不應之部不應者則為得其氣而和也不應之部反應者則為違其氣而病也應左而右應右而左者則為非其位應上而下應下而上者則為失其位皆主病也而有微甚之別甚者即尺寸反陰陽交也謂少陰之脈當寸不應反見於尺當尺不應反見於寸是為尺寸反子午卯酉年有之少陰之脈當左不應反見於右當右不應反見於左是為陰陽交辰戌醜未寅申巳亥年有之皆主死故曰命難也五運氣令微甚歌運識寒熱溫涼正氣審加臨過及平六氣大來皆邪化五運失和災病生微甚非時卒然至看與何時氣化並更與年虛月空遇重感於邪證不輕注運五運也主四時在天則有寒熱溫涼之正令在地則有生長收藏之正化氣六氣也主六步在主則有風熱火濕燥寒一定之常候在客則有六氣加臨太過不及平和之異應也凡五運六氣之來應時而至無微甚而和者皆為平氣也即應時而至或六氣大來或五運微甚或至非其時或卒然而至皆邪化失和不平之氣主害物病人也但看與何時之氣化與病同並則當消息其宜而主治也若犯之而病者更與不及之年廓空之月重感於邪則其證必重而不輕也五運平氣太過不及歌木曰敷和火升明土曰備化金審平水曰靜順皆平運太過木運曰發生火曰赫曦土敦阜水曰流衍金堅成不及委和伏明共卑監從革涸流名注太過被抑不及得助皆曰平運木名敷和敷布和氣生萬物也火名升明陽性上升其德明也土名備化土母萬物無不化也金名審平金審而平無妄刑也水名靜順體靜性順喜安瀾也甲丙戊庚壬陽年皆曰太過之運木名發生木氣有餘發生盛也火名赫曦炎暑施化陽光盛也土名敦阜敦厚高阜土尤盛也金名堅成堅則成物金有餘也水名流衍水氣太過流漫衍也乙丁己辛癸陰年皆曰不及之運木名委和和氣委弱發生少也火名伏明火德不彰光明伏也土名卑監土氣不及化卑監也金名從革金氣不及從火革也水名涸流水氣不及涸其流也運氣所至先後時歌應時而至氣和平正化承天不妄行太過氣淫先時至侮刑我者乘我刑不及氣迫後時至所勝妄行刑所生所生被刑受其病我所不勝亦來乘注應時而至謂交五運六氣之日之時正當其日其時而氣即至則為正化平氣承天之令不妄行也如時未至而氣先至來氣有餘則為太過名曰氣淫即邪化也刑我謂克我者也我刑謂我克者也假如木氣有餘克我之金不能制我金反受木之侮則木盛而土受克也必矣其年若見肝病為正邪見肺病為微邪見脾病則為賊邪也余時法此若時已至而氣未至來氣不足則為不及名曰氣迫亦邪化也所勝謂我所勝即我克者也所生我所生者也所不勝謂我所不勝即克我者也假如木氣不及我克之土無畏妄行則生我之水必受病也木衰金乘其衰亦來刑木為病也其年若腎病為實邪見心病為虛邪見肺病則賊邪也余時法此推此可知二經三經兼病之理矣運氣亢害承製歌運氣亢則皆為害畏子之制敢不承因有承製則生化亢而無制勝病生勝後子報母仇復被抑屈伏郁病成鬱極乃發因子弱待時得位自災刑注五運六氣太過而極則謂之亢亢則必害我所勝者也假如木亢極則必害我之所勝之土土之子金隨起而制木木畏承受其制則不敢妄刑彼母也五行有此承製之道自相和順則生化不病矣假如木亢盛而無制則必生勝病勝病者肝受病者脾二經同病也有勝必有復有盛必有衰自然之道也木盛而後必衰土之子金則乘衰必復勝母之仇是則更生復病也復病者肺受病者肝二經同病也餘臟法此若木不及則被金遏抑屈伏不伸而木鬱之病生也然被鬱極而乃發者蓋以木氣不及不能令子火旺故不能復也所以必待其己之得位時而後乃發也雖發而不為他害但自為災病亦由本氣弱耳故方其未發之時與勝病同勝病者肺郁病者肝及其已發之時不復病肺惟病肝也餘臟法此此上文以太過釋勝不及釋郁病非謂一歲之太過不及則分司之氣無勝復郁病也凡太過妄行害彼而病者皆勝病也受害子終不能復鬱而發病者皆郁病也不及被抑而病者亦郁病也被郁待子來報母仇而病者皆復病也推此余皆可通也六氣勝復歌邪氣有餘必有復勝病將除復病萌復已又勝衰乃止有無微甚若權衡時有常位氣無必勝在天三複地終主客有勝而無復主勝客逆客勝從注六氣有勝則必有復陰陽循環之道也勝病將除復病即萌邪正進退之機也勝已而復復已又勝本無常數必待彼此氣衰乃止自然之理也有勝則復無勝則否勝微復微勝甚復甚猶權衡之不相過也然勝復之動時雖有常位而氣無必也氣無必者謂應勝之年而無勝也時有常位者謂勝之時在前司天天位主之自初氣以至三氣此為勝之常也復之時在後在泉地位主之自四氣以至終氣此為復之常也所謂六氣互相勝復也若至六氣主客則有勝而無復也有勝而無復者以客行天令時去則已主守其位順承天命也主勝客則違天之命而氣化不行故為逆客勝主則上臨下奉而政令乃布故為從也五運鬱極乃發歌火土金鬱待時發水隨火後木無恆水發雹雪土飄驟木發毀折金清明火發曛昧有多少微者病已甚無刑木達火發金鬱泄土奪水折治之平注五郁之發各有其時火鬱待三氣火時而發土鬱待四氣土時而發金鬱待五氣金時而發此各待旺時而發也水鬱不待終氣水時而每發於二氣三氣二火時者以水陰性險見陽初退即進乘之故不待水旺而發也木鬱之發無一定之時者以木生風善行數變其氣無常故木發無恆時也五發之時既已審矣然五發徵兆五氣微甚天時民病不可不知也水發之徵微者為寒甚為雹雪雹雪寒甚也土發之徵微者為濕甚為飄驟飄驟暴風雨也木發之徵微者為風甚為毀折毀折摧拔也金髮之徵微者為燥甚為清明清明冷肅也火發之徵微者為熱甚為曛昧曛昧昏翳也多少者謂有太過不及也不及者病微太過者病甚微者病已謂本經自病也甚者兼刑謂兼我刑刑我者同病也如木氣甚我刑者土刑我者金土畏我乘來齊其化金畏我勝來同其化故三經兼見病也餘氣法此木達謂木鬱達之達者條達舒暢之義也凡木鬱之病風為清斂也宜以辛散之疏之以甘調之緩之以苦湧之平之但使木氣條達舒暢皆治木鬱之法也火發謂火鬱發之發者發揚解散之義也凡火鬱之病為寒束也宜以辛溫發之以辛甘揚之以辛涼解之以辛苦散之但使火氣發揚解散皆治火鬱之法也金泄謂金鬱泄之泄者宣泄疏降之義也凡金鬱之病燥為火困也宜以辛宣之疏之潤之以苦泄之降之清之但使燥氣宣通疏暢皆治金鬱之法也水折謂水鬱折之折者逐導滲通之義也凡水鬱之病水為濕瘀也宜以辛苦逐之導之以辛淡滲之通之但使水氣流通不蓄皆治水鬱之法也土奪謂土鬱奪之奪者汗吐下利之義也凡土鬱之病濕為風阻也在外者汗之在內者攻之在上者吐之在下者利之但使土氣不致壅阻皆治土鬱之法也天時地化五病二火歌運氣天時地化同邪正通人五臟中五臟受邪生五病五病能該萬病形熱合君火暑合相蓋以支同十二經雖分二火原同理不無微甚重輕情注木火土金水五運之化不能外乎六氣風熱暑濕燥寒六氣之化亦不能出乎五行故運雖有五氣雖有六而天之氣令地之運化皆同也邪化正化之氣皆通乎人之五臟之中正化養人邢化病人五臟受邪則生五臟之病五病能該萬病情形謂主客一定之病主客錯雜之病及勝復郁病皆莫能逃乎五病之變猶夫天地化生萬物皆莫能逃乎五行之屬也五行惟火有二在地為火在天為熱為暑以熱合少陰為君火暑合少陽為相火蓋以地有陰陽十二支同乎人之陰陽十二經火雖有二理則一也故其德政令化災病皆同然不無熱微病輕暑甚病重之情狀也五星所見太過不及歌五星歲木熒惑火辰水鎮土太白金不及減常之一二無所不勝色停勻太過北越倍一二畏星失色兼母云盛衰徐疾徵順逆留守多少吉凶分注天之垂象莫先乎五星五星者木火土金水之五星也木曰歲星居東方火曰熒惑星居南方水曰辰星居北方土曰鎮星居西南金曰太白星居西方其主歲之星不大不小不芒不暗不疾不徐行所行道守所守度此其常也若五陰年是為不及其星則減常之一不及之甚則減常之二其光芒縮主歲之星其色兼我所不勝之色而見也如木不及歲星青兼白色也火不及熒惑星紅兼黑色也土不及鎮星黃兼青色也金不及太白星白兼紅色也水不及辰星黑兼黃色也五陽年是為太過其主歲之星北越謂越出本度而近於北也北乃紫微之位太乙所居之宮也故倍常之一太過之甚倍常之二其光芒盈主歲之星其色純正畏我之星失其本色而兼生我之母色也假如木太過畏木之星土星也失其本色之黃而兼生土之火赤色也蓋以木盛而土畏必盜母氣為助故兼母色見也土兼赤色土又生子余星仿此凡星當其時則當盛非其時則當衰星遲於天為順為災病輕星速於天為逆為災病重稽留不進守度日多則災病重稽留不進守度日少則災病輕故曰吉凶分也五行德政令化災變歌木德溫和政舒啟其令宣發化生榮其變烈風雲物飛其災摧拔殞落零注木主春故其德溫暖柔和也春氣發故其政舒展開啟也春氣升故其令宣發也春主生故其化生榮也春主風故其變烈風而云物飛揚此風之勝也木勝不已則為摧折拔殞散落飄零之災也火德彰顯化蕃茂其令為熱政曜明其變災烈水泉涸其災焦灼萎枯形注火主夏故其德彰著昭顯也夏主長故其化蕃秀茂盛也夏陽盛故其令熱也夏陽外故其政光明顯曜也夏主熱故其變炎光赫烈而水泉乾涸此熱之勝也火勝不已則為萬物焦灼草萎木枯之災也土德溽蒸政安靜其令雲雨其化豐其變陰埃震驟注其災霖雨岸堤崩注土主長夏故其德溽蒸熱也土主靜故其政安靜也長夏氣濡故其令雲雨也土氣厚故其化萬物豐備也長夏主濕故其變陰晦煙埃震雷驟注暴雨此濕之勝也土勝不已則為久霖淫雨潰岸崩堤之災也金德清潔政勁切其化緊斂令露膏其變肅殺霜早降其災蒼乾草木凋注金主秋故其德清涼皎潔也秋氣肅故其政肅勁齊切也秋主收故其化緊收斂縮也秋主露故其令露膏萬物也秋主燥故其變肅寒早霜殺物此燥之勝也金勝不已則為蒼枯草木凋零之災也水德淒滄政堅肅其化清謐其令寒其變凜冽寒太甚其災冰雹霜雪連注水主冬故其德淒滄而寒也冬氣固故其政堅凝肅勁也冬主藏故其化清冷靜謐也冬主寒故其變凜冽寒氣太盛此寒之勝也水勝不已則為冰雪霜雹之災也五行地化蟲畜谷果有太過不及齊兼化歌木主化毛犬麻李火主羽馬麥杏饒土主化倮牛稷棗金主化介雞稻桃水主化鱗彘豆慄得氣皆育失蕭條太過齊化我克我不及兼化克皆苞注蟲者毛羽倮介鱗也麟為毛蟲之長而諸毛皆橫生故屬木也鳳為羽蟲之長而諸羽皆翔升故屬火也人為倮蟲之長而諸倮物皆具四肢故屬土也龜為介蟲之長而諸介皆甲堅固故屬金也龍為鱗蟲之長而諸鱗皆生於水故屬水也次則其畜犬其谷麻其果李皆木化也其畜馬其穀麥其果杏皆火化也其畜牛其谷稷其果棗皆土化也其畜雞其谷稻其果桃皆金化也其畜彘其谷豆其果粟皆水化也凡此五化之物得其氣之和則皆蕃育失其氣之和則皆蕭條而不育也太過齊化謂我所化之物與克我者所化之物皆育也假如木太過毛蟲犬畜麻谷李果木化之類育而介蟲雞畜稻穀桃果金化之類亦育蓋太過則氣盛所不勝者來齊其化也其餘太過之化仿此不及兼化謂克我者我克之者皆茂育也假如木不及克我之金其蟲介其畜雞其谷稻其果桃皆化育也蓋不及則氣衰克我者我畏之我克者不畏我來兼其化也其餘不及之化仿此苞者茂也運氣為病歌五運六氣之為病名異情同氣質分今將二病歸為一免使醫工枉費心注五運六氣之為病雖其名有木火土金水風火濕燥寒之異而其實為病之情狀則同也今將木運之病風氣之病火運之病暑氣之病土運之病濕氣之病金運之病燥氣之病水運之病寒氣之病總歸為一病不使初學醫工枉費心思而不得其頭緒也諸風掉眩屬肝木諸暴強直風所因支痛軟戾難轉側裡急筋縮兩脅疼注在天為風在地為木在人為肝在體為筋風氣通於肝故諸風為病皆屬於肝木也掉搖動也眩昏暈也風主動旋故病則頭身搖動目昏眩暈也暴卒也強直筋病強急不柔也風性勁急風入於筋故病則卒然筋急強直也其四肢拘急疼痛筋軟短縮乖戾失常難於轉側裡急脅痛亦皆風傷其筋轉入里病也諸痛癢瘡屬心火諸熱昏喑躁譫狂暴注下迫嘔酸苦膺背徹痛血家殃注在天為熱在地為火在人為心在體為脈熱氣通於心故諸火痛癢瘡之病皆屬於心火也熱微則燥皮作癢熱甚則灼膚作痛熱入經脈與血凝結淺則為癰深則為疽更深入之則傷臟腑心藏神熱乘於心則神不明故昏冒不省人事也心主言熱乘於心則神不辨故喑而不能言或妄言而譫語也火主動熱乘於身則身動而不寧故身躁擾動甚則發狂也暴注者卒暴水瀉火與水為病也下迫者後重裡急火與氣為病也嘔吐酸苦火病胃也膺背徹痛火傷胸也血家殃者熱入於脈則血滿騰不上溢則下瀉而為一切失血之病也諸濕腫滿屬脾土霍亂積飲痞閉疼食少體重肢不舉腹滿腸鳴饗泄頻注在天為濕在地為土在人為脾在體為肉濕氣通於脾故諸濕為病皆屬於脾土也濕蓄內外故肉腫腹滿也飲亂於中故病霍亂也脾失健運故病積飲也脾氣凝結故病痞硬便閉而痛也脾主化谷病則食少也脾主肌肉濕勝故身重也脾主四肢四肢不舉亦由濕使然也脾主腹濕淫腹疾故腹滿腸鳴饗泄也諸氣膹郁痿肺金喘咳痰血氣逆生諸燥澀枯涸乾勁皺揭皮膚肩臂疼注在天為燥在地為金在人為肺在體為皮燥氣通於肺故諸燥氣為病皆屬於肺金也膹郁謂氣逆胸滿膹郁不舒也痿謂肺痿咳嗽唾濁痰涎不已也喘咳氣逆唾痰涎血皆肺病也凡澀枯涸乾勁皆燥之化也幹勁似乎強直皆筋勁病也故卒然者多風入而筋勁也久之者多枯燥而筋勁也皺膚皺澀也揭皮揭起也此燥之病乎外也臂痛肩痛也亦燥之病於經也諸寒收引屬腎水吐下腥穢徹清寒厥逆禁固骨節痛癥瘕㿗疝腹急堅注在天為寒在地為水在人為腎在體為骨寒氣通於腎故諸寒氣為病皆屬於腎水也收斂也引急也腎屬水其化寒斂縮拘急寒之化也熱之化吐下酸苦故寒之化吐下腥穢也熱之化水液渾濁故寒之化澄徹清冷也厥逆四肢冷也禁固收引堅勁寒傷於外則骨節痛也寒傷於內則癥瘕㿗疝腹急堅痛也五運客運太過為病歌風氣大行太過木脾土受邪苦腸鳴饗泄食減腹支滿體重煩冤抑氣升雲物飛揚草木動搖落木勝被金乘甚則善怒顛眩冒脅痛吐甚胃絕傾注上文統論主運主氣為病此詳言五運客運專主之病也歲木太過六壬年也或歲土不及六已年也木太過則恃強乘土土不及則母弱而金衰無以制木而木亦來乘土故木氣盛則風氣大行為木太過之化在人則脾土受邪為病苦腸鳴饗泄食少腹滿體重煩冤煩冤者謂中氣抑鬱不伸故也在天則有云物飛揚之變在地則有草木動搖之化木勝不已而必衰衰則反被金乘有凋隕搖落之復也故更見善怒顛疾眩冒脅痛吐甚之肝脾病也胃絕傾者謂胃土衝陽之脈絕而不至是為脾絕故主命傾也暑熱大行太過火肺金受邪喘咳疴氣少血失及病瘧注下咽干中熱多燔炳物焦水泉涸冰雨寒霜水復過甚則譫狂胸背痛太淵脈絕命難瘥注歲火太過六戊年也或歲金不及六乙年也火太過則火恃強而乘金金不及則母弱而水衰無以制火而火亦乘金故火氣盛則暑熱大行為火太過之化在人則肺金受邪其為病喘而咳嗽氣少不足息血失而顏色瘁及瘧疾注下火瀉咽乾中熱也在天則有燔炳炎烈沸騰之變在地則有物焦槁水泉涸之化火勝不已而必衰衰則反被水乘有雨冰雹早霜寒之復也故更見譫語狂亂胸背痛之心肺病也太淵肺脈也肺金之脈絕而不至是為肺絕故主病難愈也雨濕大行太過土腎水受邪腹中疼體重煩冤意不樂雨濕河衍涸魚生風雨土崩鱗見陸腹滿溏瀉苦腸鳴足痿瘈痛並飲滿太谿腎絕命難存注歲土太過六甲年也歲水不及六辛年也土太過則土恃強而乘水水不及則母弱而木衰無以制土而土亦乘水故土氣盛則雨濕大行為土太過之化在人則腎水受邪其為病四肢冷厥腹中痛體重煩冤意不樂也在天則有雨濕數至之變在地則有河衍涸澤生魚之化濕勝不已而必衰衰則反被木乘有風雨大至土崩鱗見於陸之復也故更見腹滿溏瀉腸鳴足痿瘈痛飲滿之脾胃病也太谿腎脈也腎水之脈絕而不至是為腎絕故曰主命難存也清燥大行太過金肝木受邪耳無聞脅下少腹目赤痛草木凋隕焦槁屯甚則胸膺引背痛胠脅何能反側身喘咳氣逆而血溢太衝脈絕命難生注歲金太過六庚年也歲木不及六丁年也金太過則金恃強而乘木木不及則母弱而火衰無以制金而金亦乘木故金氣盛則清燥大行為金太過之化在人則肝木受邪其為病耳聾無聞脅下痛少腹痛目眥赤痛也在天則有清燥肅殺之變在地則有草木凋隕之化燥勝不已而必衰衰則反被火乘有蒼干焦槁之復也故更見胸膺引背胠脅疼痛不能轉側喘咳氣逆失血之肝肺病也太衝肝脈也肝木之脈絕而不至是為肝絕故主命難生也寒氣大行太過水邪害心火熱心煩躁悸譫妄心中痛天冰霜雪地裂堅埃霧蒙郁寒雨至甚則腫咳病中寒腹滿溏鳴食不化神門脈絕死何言注歲水太過六丙年也歲火不及六癸年也水太過則水恃強而乘火火不及則母弱而土衰無以制水而水亦乘火故水氣盛則寒氣大行為水太過之化在人則心火受邪其為病心煩躁悸譫語妄言心中熱痛也在天則有雨冰霜雪之變在地則有凍裂堅剛之化寒勝不已而必衰衰則反被土乘有埃霧蒙郁不散寒雨大至之復也故更見腫喘中寒腹滿溏瀉腸鳴飲食不化之腎脾病也神門心脈也心火之脈絕而不至是為心絕故主死也六氣客氣主病歌少陰司天熱下臨肺氣上從病肺心燥行於地肝應病燥熱交加民病生喘咳血溢及血瀉寒熱鼽嚏涕流頻瘡瘍目赤嗑干腫厥心脅痛苦呻吟注上文統論主運主氣為病此則詳言六氣客氣專主之病也少陰君火司天子午歲也火氣下臨金之所畏故肺氣上從而病肺心也凡少陰司天則陽明燥金在泉故燥行於地而病肝也是則知燥熱交加民病喘咳血上溢血下泄寒熱鼽塞噴嚏流涕瘡瘍目赤嗌乾腫痛心痛脅痛皆其證也太陰司天濕下臨腎氣上從病腎陰寒行於地心脾病寒濕交攻內外淫民病身重足跗腫霍亂痞滿腹脹䐜肢厥拘急腳下痛少腹腰疼轉動屯注太陰濕土司天丑未歲也濕氣下臨水之所畏故腎氣上從而病腎陰也凡太陰司天則太陽寒水在泉故寒行於地而病心脾也是知寒濕內外交攻民病身重足跗腫霍亂痞滿腹脹四肢厥逆拘急腳下痛少腹痛腰痛難於動轉皆其證也少陽司天火下臨肺氣上從火刑金風行於地肝木勝風火為災是乃因民病熱中咳失血目赤喉痹聾眩瞑瘡瘍心痛瞤瘛冒暴死皆因臣犯君注少陽相火司天寅申歲也火氣下臨金之所畏故肺氣上從而病肺也凡少陽司天則厥陰風木在泉故風行於地木勝則病在肝是則知風火為災民病熱中咳而失血目赤喉痹耳聾眩瞑瘡瘍心痛瞤動瘛瘲昏冒皆其證也暴死者是三之客氣相火加臨君火以臣犯君故也陽明司天燥下臨肝氣上從病肝筋熱行於地心肺害清燥風熱互交侵民病寒熱咳膹郁掉振筋痿力難伸煩冤脅痛心熱痛目痛眥紅小便熏注陽明燥金司天卯酉歲也燥氣下臨木之所畏故肝氣上從而病肝筋也凡陽明司天則少陰君火在泉故熱行於地而病肺心也是則知清燥風熱交侵民病寒熱而咳胸郁膹滿掉搖振動筋痿無力煩冤抑鬱不伸兩脅心中熱痛目痛眥紅小便絳色皆其證也太陽司天寒下臨心氣上從病脈心濕行於地脾肉病寒濕熱內去推尋民病寒中終反熱癰疽火鬱病纏身皮𤸆肉苛足痿軟濡瀉滿腫乃濕根注太陽寒水司天辰戌歲也寒氣下臨火之所畏故心氣上從而病心脈也凡太陽司天則太陰濕土在泉故濕行於地而病脾肉也是則知寒濕熱氣相合民病始為寒中終反變熱如癰疽一切火鬱之病皮𤸆痹而重著肉苛不用不仁足痿無力濕瀉腹滿身腫皆其證也厥陰司天風下臨脾氣上從脾病生火行於地冬溫化風火寒濕為病民耳鳴掉眩風化病支滿腸鳴饗瀉頻體重食減肌肉痿溫厲為災火化淫注厥陰風木司天巳亥歲也風氣下臨土之所畏故脾氣上從而病脾也凡厥陰司天則少陽相火在泉故火行於地而病溫也是則知風火寒濕雜揉民病耳聾振掉眩暈腹滿腸鳴完穀不化之瀉體重食減肌肉痿瘦皆其證也運氣當審常變歌未達天道之常變反謂氣運不相應既識一定之常理再審不定變化情任爾百千雜合病要在天時地化中知其要者一言畢不得其旨散無窮注近世醫者皆謂五運六氣與歲不應置而不習是未達天道之常變也時之常者如春溫夏熱秋涼冬寒也日之常者早涼午熱暮溫夜寒也時之變者春不溫夏不熱暑不蒸秋不涼冬不寒也日之變者早溫午寒暮涼夜熱也但學醫者欲達常變之道當先識一定主客之理次審不定變化卒然之情然後知百千雜合之氣為病俱莫能逃天時地化之理也雖或有不應亦當審察與天時何時地化何化人病何病相同即同彼時彼化彼病而施治之乃無差謬此知其要者一言而終也為醫者可不於運氣中一加意耶附衝陽諸脈穴位衝陽穴在足跗上五寸去陷骨二寸骨間動脈太淵穴在掌後內側橫紋頭動脈中太谿穴在足內踝後五分跟骨上動脈陷中太衝穴在足大指本節二寸間動脈應手陷中神門穴在掌後銳骨端陷中附衝陽諸脈穴圖
